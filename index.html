<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Deportivo - Pitaco</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #0d0f18; color: #e8eaf0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
.app { padding: 28px 24px; max-width: 1300px; margin: 0 auto; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo h1 { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
.logo-sub { font-size: 12px; color: #4b5563; font-weight: 400; margin-left: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; animation: pulse 2s infinite; flex-shrink: 0; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.85)} }
.week-nav { display: flex; align-items: center; gap: 10px; }
.week-label { font-size: 13px; font-weight: 600; color: #e8eaf0; min-width: 200px; text-align: center; }
.nav-btn { background: #1a1d2e; border: 1px solid #2a2d3a; color: #6b7280; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.nav-btn:hover { border-color: #4f46e5; color: #fff; background: #1e2040; }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.controls { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
.search-wrap { position: relative; flex: 1; min-width: 220px; max-width: 360px; }
.search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: #4b5563; width: 14px; height: 14px; }
input[type=text] { width: 100%; padding: 8px 12px 8px 34px; background: #13151f; border: 1px solid #1e2130; border-radius: 8px; color: #e8eaf0; font-size: 12px; outline: none; font-family: inherit; transition: border-color 0.15s; }
input[type=text]:focus { border-color: #4f46e5; }
input[type=text]::placeholder { color: #374151; }
.updated { font-size: 11px; color: #374151; margin-left: auto; }
.table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid #1a1d2e; }
table { width: 100%; border-collapse: collapse; min-width: 800px; }
thead tr { background: #13151f; }
thead th { padding: 0; border-bottom: 1px solid #1a1d2e; text-align: center; white-space: nowrap; }
thead th.col-sport { text-align: left; min-width: 200px; padding: 16px 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #374151; }
thead th.col-lw { border-left: 1px solid #1a1d2e; min-width: 80px; padding: 16px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #374151; }
.day-header { padding: 12px 16px 10px; display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 90px; }
.day-name { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #4b5563; }
.day-date { font-size: 20px; font-weight: 700; color: #9ca3af; line-height: 1; }
.day-month { font-size: 10px; font-weight: 500; color: #374151; text-transform: uppercase; letter-spacing: 0.05em; }
thead th.today-col .day-name { color: #818cf8; }
thead th.today-col .day-date { color: #fff; }
thead th.today-col .day-month { color: #6366f1; }
thead th.today-col { background: #13152a; }
thead th.past-col .day-date { color: #374151; }
thead th.past-col .day-name { color: #2d3748; }
thead th.past-col .day-month { color: #1f2937; }
tr.sport-row { cursor: pointer; user-select: none; }
tr.sport-row td { padding: 14px 20px; border-top: 1px solid #1a1d2e; background: #0d0f18; transition: background 0.12s; }
tr.sport-row:hover td { background: #111320; }
tr.sport-row td.today-col { background: #0d0f20; }
tr.sport-row:hover td.today-col { background: #111328; }
tr.sport-row td.col-lw { border-left: 1px solid #1a1d2e; }
.sport-label { display: flex; align-items: center; gap: 10px; }
.sport-bar { width: 3px; height: 20px; border-radius: 2px; flex-shrink: 0; }
.sport-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
.sport-count-badge { font-size: 10px; color: #374151; font-weight: 500; margin-left: 2px; }
.toggle-icon { color: #2d3748; font-style: normal; font-size: 9px; transition: transform 0.2s; display: inline-block; margin-left: auto; }
.toggle-icon.open { transform: rotate(90deg); }
.sport-num { font-size: 18px; font-weight: 700; line-height: 1; }
.cell-empty { color: #1e2130; font-size: 13px; }
tr.league-row.hidden { display: none; }
tr.league-row td { padding: 6px 20px 6px 36px; border-bottom: 1px solid #0d0f18; background: #0f1120; transition: background 0.12s; font-size: 12px; color: #4b5563; }
tr.league-row td.col-sport { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
tr.league-row:hover td { background: #111428; color: #6b7280; }
tr.league-row td.today-col { background: #0d1025; }
tr.league-row:hover td.today-col { background: #111330; }
tr.league-row td.col-lw { border-left: 1px solid #1a1d2e; }
.league-num { font-size: 13px; font-weight: 500; color: #6b7280; }
.day-cell { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 16px; }
.delta { font-size: 10px; font-weight: 700; }
.delta.up { color: #22c55e; }
.delta.down { color: #ef4444; }
.lw-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.lw-pct { font-size: 12px; font-weight: 700; }
.lw-pct.up { color: #22c55e; }
.lw-pct.down { color: #ef4444; }
.lw-pct.neutral { color: #374151; }
.no-data { color: #374151; font-size: 13px; text-align: center; padding: 64px; }
.note { font-size: 11px; color: #2d3748; text-align: center; padding: 12px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <span class="dot"></span>
      <h1>Calendario Deportivo <span class="logo-sub">Pitaco</span></h1>
    </div>
    <div class="week-nav">
      <button class="nav-btn" id="btnPrev" onclick="changeWeek(-1)">&#8249;</button>
      <div class="week-label" id="weekLabel"></div>
      <button class="nav-btn" id="btnNext" onclick="changeWeek(1)">&#8250;</button>
    </div>
  </div>
  <div class="controls">
    <div class="search-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Buscar categoria o liga..." oninput="render()">
    </div>
    <div class="updated" id="updatedAt"></div>
  </div>
  <div class="table-wrap">
    <table>
      <thead id="calHead"></thead>
      <tbody id="calBody"></tbody>
    </table>
  </div>
  <div class="note" id="weekNote"></div>
</div>

var MIN_OFFSET = -1;
var MAX_OFFSET = 5;

var CAT_COLORS = {
  'Games':'#4f46e5','Soccer':'#16a34a','Basketball':'#d97706',
  'Tennis':'#0891b2','Table Tennis':'#0e7490','Volleyball':'#db2777',
  'Handball':'#8b5cf6','American Football':'#92400e','Baseball':'#b45309',
  'Boxing':'#dc2626','MMA':'#991b1b','Ice Hockey':'#0284c7',
  'Futsal':'#06b6d4','Formula 1':'#e11d48','Golf':'#65a30d',
  'Darts':'#ec4899','Cycling':'#f59e0b','Badminton':'#10b981',
  'Squash':'#14b8a6','Rugby':'#7c3aed','Cricket':'#84cc16',
  'Surf':'#0ea5e9','Speedway':'#f97316','Lacrosse':'#a855f7',
  'Hurling':'#22c55e','Water Polo':'#38bdf8','Racing':'#fb923c',
  'Snooker':'#a3e635','Outros':'#6b7280'
};

var CAT_ORDER = ['Soccer', 'Games', 'Basketball', 'Baseball'];

var DAYS = ['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
var MONTHS = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
var weekOffset = 0;
var expandedCats = new Set();

function catColor(c) { return CAT_COLORS[c] || '#6b7280'; }
function addDays(d, n) { var r = new Date(d.getTime()); r.setDate(r.getDate()+n); return r; }
function dateKey(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function isToday(d) { var n=new Date(); return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate(); }
function isPast(d) { var n=new Date(); n.setHours(0,0,0,0); return d<n; }

function getWeekDates(offset) {
  var baseTue = new Date(DATA.current_tue+'T00:00:00');
  var tue = addDays(baseTue, offset*7);
  var dates = [];
  for (var i=0;i<7;i++) dates.push(addDays(tue,i));
  return dates;
}
function getCounts(offset) { return DATA.weeks[String(offset)] || {}; }
function getPrevCounts(offset) { return DATA.weeks[String(offset-1)] || {}; }

function weekTotal(catData, dates) {
  var t=0;
  Object.keys(catData).forEach(function(l) { dates.forEach(function(d) { t+=(catData[l][dateKey(d)]||0); }); });
  return t;
}
function prevWeekTotal(prevCatData, dates) {
  var t=0;
  Object.keys(prevCatData).forEach(function(l) { dates.forEach(function(d) { t+=((prevCatData[l]||{})[dateKey(addDays(d,-7))]||0); }); });
  return t;
}
function renderDelta(curr, prev) {
  if (!prev || prev===0) return '';
  var pct = Math.round(((curr-prev)/prev)*100);
  if (pct>0) return '<div class="delta up">&#8593;'+pct+'%</div>';
  if (pct<0) return '<div class="delta down">&#8595;'+Math.abs(pct)+'%</div>';
  return '';
}
function renderLWCell(curr, prev) {
  if (!prev && !curr) return '<td class="col-lw" style="text-align:center"><span class="cell-empty">-</span></td>';
  var html = '<td class="col-lw" style="text-align:center"><div class="lw-wrap">';
  if (prev > 0) {
    var pct = Math.round(((curr-prev)/prev)*100);
    var cls = pct>0?'up':pct<0?'down':'neutral';
    var arrow = pct>0?'&#8593;':pct<0?'&#8595;':'';
    html += '<span class="lw-pct '+cls+'">'+(pct!==0?arrow:'')+Math.abs(pct)+'%</span>';
  } else {
    html += '<span class="lw-pct neutral">-</span>';
  }
  html += '</div></td>';
  return html;
}

function changeWeek(dir) {
  var next = weekOffset + dir;
  if (next < MIN_OFFSET || next > MAX_OFFSET) return;
  weekOffset = next;
  expandedCats.clear();
  render();
}

function handleRowClick(e) {
  var row = e.target.closest('tr.sport-row');
  if (!row) return;
  var cat = row.getAttribute('data-cat');
  if (!cat) return;
  if (expandedCats.has(cat)) { expandedCats.delete(cat); } else { expandedCats.add(cat); }
  var leagueRows = document.querySelectorAll('tr.league-row[data-cat="'+cat.replace(/"/g,'\"')+'"]');
  leagueRows.forEach(function(r) { r.classList.toggle('hidden'); });
  var icon = row.querySelector('.toggle-icon');
  if (icon) icon.classList.toggle('open');
}

function render() {
  var dates = getWeekDates(weekOffset);
  var counts = getCounts(weekOffset);
  var prevCounts = getPrevCounts(weekOffset);
  var q = document.getElementById('searchInput').value.toLowerCase();

  document.getElementById('btnPrev').disabled = weekOffset <= MIN_OFFSET;
  document.getElementById('btnNext').disabled = weekOffset >= MAX_OFFSET;

  var d0=dates[0]; var d6=dates[6];
  document.getElementById('weekLabel').textContent =
    DAYS[d0.getDay()]+' '+d0.getDate()+' '+MONTHS[d0.getMonth()]+
    ' — '+DAYS[d6.getDay()]+' '+d6.getDate()+' '+MONTHS[d6.getMonth()];
  document.getElementById('weekNote').textContent = weekOffset === 0 ? '' :
    weekOffset < 0 ? 'Semana anterior' : 'Semana +'+weekOffset;
  var now=new Date();
  document.getElementById('updatedAt').textContent='Actualizado '+
    String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');

  var allCats = Object.keys(counts).filter(function(c) {
    if (!q) return true;
    if (c.toLowerCase().includes(q)) return true;
    return Object.keys(counts[c]||{}).some(function(l){ return l.toLowerCase().includes(q); });
  });

  // Orden fijo para las primeras 4, resto por cantidad
  allCats.sort(function(a, b) {
    var ia = CAT_ORDER.indexOf(a);
    var ib = CAT_ORDER.indexOf(b);
    if (ia !== -1 && ib !== -1) return ia - ib;
    if (ia !== -1) return -1;
    if (ib !== -1) return 1;
    return weekTotal(counts[b]||{},dates) - weekTotal(counts[a]||{},dates);
  });

  var headHtml = '<tr><th class="col-sport">Categoria / Liga</th>';
  dates.forEach(function(d) {
    var cls = isToday(d)?'today-col':isPast(d)?'past-col':'';
    headHtml += '<th class="'+cls+'"><div class="day-header">'+
      '<span class="day-name">'+DAYS[d.getDay()]+'</span>'+
      '<span class="day-date">'+d.getDate()+'</span>'+
      '<span class="day-month">'+MONTHS[d.getMonth()]+'</span>'+
      '</div></th>';
  });
  headHtml += '<th class="col-lw">vs LW</th></tr>';
  document.getElementById('calHead').innerHTML = headHtml;

  if (!allCats.length) {
    document.getElementById('calBody').innerHTML = '<tr><td colspan="9" class="no-data">Sin datos para esta semana</td></tr>';
    return;
  }

  var bodyHtml = '';
  allCats.forEach(function(cat) {
    var catData = counts[cat]||{};
    var prevCatData = prevCounts[cat]||{};
    var color = catColor(cat);
    var isExpanded = expandedCats.has(cat);
    var safeAttr = cat.replace(/&/g,'&amp;').replace(/"/g,'&quot;');

    var catDayTotals = dates.map(function(d) {
      var dk=dateKey(d);
      return Object.keys(catData).reduce(function(acc,l){ return acc+(catData[l][dk]||0); },0);
    });
    var wTotal = catDayTotals.reduce(function(a,b){return a+b;},0);
    var prevWTotal = prevWeekTotal(prevCatData, dates);

    bodyHtml += '<tr class="sport-row" data-cat="'+safeAttr+'">';
    bodyHtml += '<td><div class="sport-label">'+
      '<span class="sport-bar" style="background:'+color+'"></span>'+
      '<span class="sport-name" style="color:'+color+'">'+cat+'</span>'+
      '<span class="sport-count-badge">('+wTotal.toLocaleString()+')</span>'+
      '<i class="toggle-icon'+(isExpanded?' open':'')+'">&#9654;</i>'+
      '</div></td>';

    catDayTotals.forEach(function(total, i) {
      var cls = isToday(dates[i])?'today-col':'';
      var prevDk = dateKey(addDays(dates[i],-7));
      var prevTotal = Object.keys(prevCatData).reduce(function(acc,l){ return acc+((prevCatData[l]||{})[prevDk]||0); },0);
      if (total>0) {
        bodyHtml += '<td class="'+cls+'" style="text-align:center">'+
          '<div class="day-cell">'+
          '<span class="sport-num" style="color:'+color+'">'+total.toLocaleString()+'</span>'+
          renderDelta(total, prevTotal)+
          '</div></td>';
      } else {
        bodyHtml += '<td class="'+cls+'" style="text-align:center"><span class="cell-empty">—</span></td>';
      }
    });
    bodyHtml += renderLWCell(wTotal, prevWTotal);
    bodyHtml += '</tr>';

    var leagues = Object.keys(catData).filter(function(l) {
      if (!q) return true;
      if (cat.toLowerCase().includes(q)) return true;
      return l.toLowerCase().includes(q);
    });
    leagues.sort(function(a,b) {
      var ta=dates.reduce(function(acc,d){return acc+(catData[a][dateKey(d)]||0);},0);
      var tb=dates.reduce(function(acc,d){return acc+(catData[b][dateKey(d)]||0);},0);
      return tb-ta;
    });

    leagues.forEach(function(league) {
      var lTotal=dates.reduce(function(acc,d){return acc+(catData[league][dateKey(d)]||0);},0);
      var prevLTotal=dates.reduce(function(acc,d){return acc+((prevCatData[league]||{})[dateKey(addDays(d,-7))]||0);},0);
      var safeLeagueAttr = league.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
      bodyHtml += '<tr class="league-row'+(isExpanded?'':' hidden')+'" data-cat="'+safeAttr+'">';
      bodyHtml += '<td class="col-sport" title="'+safeLeagueAttr+'">'+league+'</td>';
      dates.forEach(function(d) {
        var dk=dateKey(d);
        var cnt=(catData[league][dk])||0;
        var cls=isToday(d)?'today-col':'';
        bodyHtml += cnt>0
          ? '<td class="'+cls+'" style="text-align:center"><span class="league-num">'+cnt+'</span></td>'
          : '<td class="'+cls+'" style="text-align:center"><span class="cell-empty">—</span></td>';
      });
      bodyHtml += renderLWCell(lTotal, prevLTotal);
      bodyHtml += '</tr>';
    });
  });

  document.getElementById('calBody').innerHTML = bodyHtml;
  document.getElementById('calBody').removeEventListener('click', handleRowClick);
  document.getElementById('calBody').addEventListener('click', handleRowClick);
}

render();
</script>
</body>
</html>
